<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2a44" />
  <meta name="color-scheme" content="light" />
  <title>Snakes &amp; Ladders</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOBBY -->
  <div id="lobby" class="lobby">
    <div class="lobby-inner">
      <!-- [TITLE REDESIGN] Branded game typography with structured spans -->
      <h1 class="lobby-title">
        <span class="title-word">Snakes</span>
        <span class="title-amp">&amp;</span>
        <span class="title-word">Ladders</span>
      </h1>
      <p class="lobby-sub" id="authStatus">Connecting to Supabase&hellip;</p>
      <div class="lobby-card">
        <label for="playerName">Your name</label>
        <input id="playerName" type="text" maxlength="20" placeholder="Enter name" autocomplete="off" />

        <label>Your token</label>
        <div id="avatarPick" class="avatar-pick" role="group" aria-label="Choose your token"></div>

        <label>Dice skin</label>
        <div id="diceSkinPick" class="dice-skin-pick" role="group" aria-label="Choose your dice skin"></div>

        <label for="onlineMaxPlayers">Players</label>
        <select id="onlineMaxPlayers">
          <option value="2">2 players</option>
          <option value="3">3 players</option>
          <option value="4">4 players</option>
        </select>

        <label class="ls-check">
          <input type="checkbox" id="onlinePowerUps" />
          <span>Power-up tiles</span>
        </label>

        <button id="createRoomBtn" class="btn btn-primary btn-block">Create Room</button>
        <div class="divider"><span>or join</span></div>
        <label for="roomCodeInput">Room code</label>
        <input id="roomCodeInput" type="text" maxlength="6" placeholder="ABC123" autocomplete="off" />
        <button id="joinRoomBtn" class="btn btn-outline btn-block">Join Room</button>
        <div class="divider"><span>or play offline</span></div>
        <button id="localPlayBtn" class="btn btn-outline btn-block">Play vs Computer</button>
      </div>
      <div class="lobby-controls">
        <button id="themeBtn" class="bar-btn" aria-label="Change theme">Theme: Light</button>
        <button id="statsBtn" class="bar-btn" aria-label="View stats">Stats</button>
      </div>
      <!-- [FOOTNOTE] Quiet premium brand attribution -->
      <p class="lobby-footnote">Workflow Coaching and Optimisation Co.</p>
    </div>
  </div>

  <!-- LOCAL SETUP -->
  <div id="localSetup" class="modal-overlay hidden" role="dialog" aria-labelledby="localSetupTitle">
    <div class="modal-box">
      <h2 id="localSetupTitle">Offline Game</h2>

      <label for="lsPlayers">Players</label>
      <select id="lsPlayers">
        <option value="2">2 players</option>
        <option value="3">3 players</option>
        <option value="4">4 players</option>
      </select>

      <div id="lsSeats" class="ls-seats"></div>

      <label for="lsBoard">Board</label>
      <select id="lsBoard">
        <option value="random">Random</option>
      </select>

      <label class="ls-check">
        <input type="checkbox" id="lsPowerUps" checked />
        <span>Power-up tiles</span>
      </label>

      <label for="lsTimer">Turn timer</label>
      <select id="lsTimer">
        <option value="0">Off</option>
        <option value="15">15 seconds</option>
        <option value="30">30 seconds</option>
      </select>

      <div class="modal-actions">
        <button id="lsStartBtn" class="btn btn-primary btn-block">Start Game</button>
        <button id="lsCancelBtn" class="btn btn-outline btn-block">Cancel</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsOverlay" class="modal-overlay hidden" role="dialog" aria-labelledby="settingsTitle">
    <div class="modal-box">
      <h2 id="settingsTitle">Settings</h2>

      <label>Theme</label>
      <button id="settingsThemeBtn" class="btn btn-outline btn-block">Theme: Light</button>

      <label>Sound</label>
      <button id="muteBtn" class="btn btn-outline btn-block" aria-pressed="false">&#128266; Sound on</button>

      <label>Dice skin</label>
      <div id="diceSkinPickGame" class="dice-skin-pick" role="group" aria-label="Choose your dice skin"></div>

      <div class="modal-actions">
        <button id="settingsCloseBtn" class="btn btn-primary btn-block">Close</button>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="statsOverlay" class="modal-overlay hidden" role="dialog" aria-labelledby="statsTitle">
    <div class="modal-box">
      <h2 id="statsTitle">Your Stats</h2>
      <div id="statsBody" class="stats-body"></div>
      <div class="modal-actions">
        <button id="statsCloseBtn" class="btn btn-primary btn-block">Close</button>
        <button id="statsClearBtn" class="btn btn-outline btn-block">Clear History</button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="gameScreen" class="game-screen hidden">
    <header class="room-bar">
      <span class="room-tag">ROOM</span>
      <span id="roomCodeDisplay" class="room-code">------</span>
      <button id="settingsBtnGame" class="bar-btn" aria-label="Settings">&#9881;</button>
      <button id="copyCodeBtn" class="bar-btn" aria-label="Copy room code">Copy</button>
      <button id="refreshRoomBtn" class="bar-btn" aria-label="Refresh room state">Refresh</button>
      <button id="leaveRoomBtn" class="bar-btn" aria-label="Leave room">Leave</button>
    </header>

    <!-- Online player strip (built dynamically, 2-4 seats) -->
    <div id="playerStrip" class="player-strip"></div>

    <!-- LOCAL multi-player strip (built dynamically) -->
    <div id="localStrip" class="player-strip local-strip hidden"></div>

    <div id="turnBanner" class="turn-banner state-wait" aria-live="polite">
      <span id="turnText">Waiting for opponent&hellip;</span>
    </div>
    <div id="turnTimer" class="turn-timer hidden"><span id="turnTimerBar" class="turn-timer-bar"></span></div>

    <div id="emoteBar" class="emote-bar hidden" role="group" aria-label="Send a reaction"></div>

    <div class="game-layout">
      <div class="board-frame">
        <div id="board" class="board" aria-label="Game board"></div>
      </div>
      <div class="side-col">
        <div id="dice" class="dice" aria-label="Dice">
          <div id="diceCube" class="dice-cube" aria-hidden="true"></div>
          <span id="diceChar" class="dice-val" aria-live="polite">?</span>
        </div>
        <p id="lastAction" class="side-hint">Roll to start</p>
        <button id="rollDiceBtn" class="roll-btn" disabled>Roll</button>
        <p id="boardName" class="side-hint board-label">&mdash;</p>
      </div>
    </div>

    <div id="actionToast" class="toast hidden" role="status" aria-live="polite">
      <span id="toastText"></span>
    </div>

    <details class="log-panel">
      <summary>Move log</summary>
      <div id="log" class="log" role="log"></div>
    </details>
  </div>

  <!-- WIN OVERLAY -->
  <div id="winOverlay" class="win-overlay hidden" role="dialog" aria-labelledby="winTitle">
    <div class="win-box">
      <div class="win-crown" aria-hidden="true">&#128081;</div>
      <h2 id="winTitle">Victory!</h2>
      <p id="winMessage">&mdash;</p>
      <div id="winStandings" class="win-standings"></div>
      <div class="win-actions">
        <button id="rematchBtn" class="btn btn-primary btn-block">Rematch</button>
        <button id="leaveBtn" class="btn btn-outline btn-block">Leave</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
