<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monochrome Snakes and Ladders</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Snakes and Ladders</h1>
      <p class="sub">Phase 4 · create room · join room · waiting room · Supabase-backed</p>

      <div class="stats">
        <p id="authStatus">Connecting to Supabase…</p>
        <p id="roomStatus">No room joined.</p>
        <p id="status">Game not started.</p>
        <p id="boardName">Board: -</p>
        <p id="lastRoll">Last roll: -</p>
        <p id="positions">Black: 0 | White: 0</p>
      </div>

      <section class="room-controls">
        <h2>Room</h2>
        <label for="playerName">Player name</label>
        <input id="playerName" type="text" maxlength="20" placeholder="Enter your name" />

        <div class="actions">
          <button id="createRoomBtn">Create Room</button>
        </div>

        <label for="roomCodeInput">Join with room code</label>
        <input id="roomCodeInput" type="text" maxlength="6" placeholder="ABC123" />

        <div class="actions">
          <button id="joinRoomBtn" class="button-secondary">Join Room</button>
          <button id="refreshRoomBtn" class="button-secondary">Refresh Room</button>
        </div>
      </section>

      <section class="legend">
        <h2>Room info</h2>
        <p id="roomCodeDisplay">Room code: -</p>
        <p id="roleDisplay">Role: -</p>
        <p id="playersDisplay">Players: -</p>
      </section>

      <section>
        <h2>Move Log</h2>
        <div id="log" class="log"></div>
      </section>
    </section>

    <section class="board-panel">
      <div id="board" class="board" aria-label="Snakes and Ladders board"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
